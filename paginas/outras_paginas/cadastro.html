<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> PROJETO WEB QPR 210 002</title>
    <link rel="stylesheet" href="/css/style_formulario.css">
</head>

<body>

    <div id="links">
        <a href="/index.html">Página Inicial</a> | <a href="texto.html">Texto</a>
        <a href="/paginas/outras_paginas/outro_texto.html">Outro Texto</a> | <a href="imagens.html">Imagens</a>
    </div>
        <h3>Formulário HTML</h3>

        <form name="form-pessoa" id="form-pessoa" method="post" >

            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-txt01"  placeholder="Informe seu nome">

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-txt02" maxlength="11" required placeholder="Informe o CPF">

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-txt02" maxlength="11" required pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{3}-[0-9]{2}" placeholder="000.000.000-00">

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sxF" class="input-radio" required value="F"> Feminino
            <input type="radio" name="sexo" id="sxM" class="input-radio" required value="M"> Masculino
            <input type="radio" name="sexo" id="sxND" class="input-radio" required value="N" > Não Declarar

            <label for="estado">Estado</label>
            <select name="estado" id="estado" required >
                <option> Selecione o Estado </option>
                <option value="AL">Alagoas</option>
                <option value="BA">Bahia</option>
                <option value="PE">Pernambuco</option>
                <option value="PB">Paraíba</option>
                <option value="MA">Maranhão</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="CE">Ceara</option>
                <option value="PI">Piaúi</option>
                <option value="SE" selected>Sergipe </option>

            </select>

            <label for="preferencias">Preferências</label>
            <input type="checkbox" name="estado"  id="estado" value="estado">Estudo
            <input type="checkbox" name="viagem"  id="viagem" value="viagem">Viagem
            <input type="checkbox" name="trabalho" id="trabalho" value="trabalho">Trabalho
            <input type="checkbox" name="compras"  id="compras" value="compras">Compras

            <label for="comentario">Comentário</label>
            <textarea name="comentario" id="comentario" placeholder="Digite seu comentário"></textarea>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input-txt02" required placeholder="Informe uma senha" maxlength="6">

            <label for="datanascimento">Data Nascimento</label>
            <input type="date" name="datanascimento" id="datanascimento" class="input-txt02" required>

            <label for="quantidade">Quantidade</label>
            <input type="range" name="quantidade" id="quantidade" class="input-txt02" min="0" max="10" >

            <div id="div-btns">
            <button type="submit" id="btn-enviar" >Enviar</button>
            <button type="reset" id="btn-limpar" >Limpar</button>
            <button id="div-btns" >Botão</button>
            
        </div>
        </form>
</body>
</html>
